services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:2026.3.13-1
    container_name: claw-one-test-openclaw
    command: ["/usr/local/bin/openclaw", "gateway", "--allow-unconfigured"]
    user: "0:0"  # 以 root 用户运行避免权限问题
    restart: unless-stopped  # 自动重启
    ports:
      - "28789:18790"  # 映射到实际的 gateway 端口 18790
    volumes:
      - openclaw-config:/root/.openclaw:rw  # 使用 root 用户目录
    networks:
      - claw-one-test-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18790/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10

  claw-one:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.e2e
    container_name: claw-one-test-app
    ports:
      - "28080:8080"  # 非标准端口
    environment:
      - CLAW_OPENCLAW_CONFIG=/tmp/test-openclaw/openclaw.json
      - CLAW_ONE_CONFIG=/app/config/claw-one.toml
      - RUST_LOG=info
    volumes:
      - openclaw-config:/tmp/test-openclaw:rw
      - claw-one-data:/app/data:rw
    networks:
      - claw-one-test-net
    depends_on:
      openclaw:
        condition: service_healthy

  playwright:
    build:
      context: ..
      dockerfile: e2e/Dockerfile.playwright
    container_name: claw-one-test-playwright
    environment:
      - CLAW_ONE_URL=http://claw-one-test-app:8080
      - CI=true
    networks:
      - claw-one-test-net
    depends_on:
      claw-one:
        condition: service_started
    # 挂载 openclaw 配置目录到容器内，用于验证 openclaw.json 内容
    volumes:
      - openclaw-config:/app/openclaw-config:ro
      - ./playwright-report:/app/playwright-report
      - ./test-results:/app/test-results

volumes:
  openclaw-config:
  claw-one-data:

networks:
  claw-one-test-net:
    name: claw-one-test-net
